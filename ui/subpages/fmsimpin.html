<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>飞猫分身卡切换</title>
</head>
<body>
  <div class="card">
    <div class="title">飞猫分身卡 (PIN) 切换</div>
    <p class="func-note">直接通过 AT 端口发送切卡命令。<br>无需安装任何浏览器插件。</p>
  </div>

  <div class="card" style="border-color:rgba(255,70,70,.5)">
    <div class="title" style="color:#ff9999">高风险操作</div>
    <p class="func-note" style="color:#ffb3b3">PIN 码错误将导致锁卡！<br>确认当前使用的是飞猫分身卡后再操作。</p>
  </div>

  <a href="act:simswitch:0200" class="card lockcard">
    <div class="lc-t">切换到移动</div>
    <div class="lc-b">PIN 0200 · China Mobile</div>
  </a>

  <a href="act:simswitch:0100" class="card lockcard">
    <div class="lc-t">切换到联通</div>
    <div class="lc-b">PIN 0100 · China Unicom</div>
  </a>

  <a href="act:simswitch:0300" class="card lockcard">
    <div class="lc-t">切换到电信</div>
    <div class="lc-b">PIN 0300 · China Telecom</div>
  </a>

  <div class="card">
    <div class="title">操作说明</div>
    <table>
      <tr><td class="kv-l">适用卡型</td><td class="val">飞猫5G三网卡 / 分身卡</td></tr>
      <tr><td class="kv-l">切换耗时</td><td class="val">约 15-30 秒</td></tr>
      <tr><td class="kv-l">注意事项</td><td class="val">切换中勿断电、勿切WiFi</td></tr>
      <tr><td class="kv-l">切后操作</td><td class="val">自动等待网络恢复</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="title">操作日志</div>
    {{FMSIMACTIONLOG}}
  </div>

  <div class="card">
    <div class="title">快捷操作</div>
    <div class="seg seg4">
      <a href="act:backfunc" class="segc">返回</a>
      <a href="act:sub:wifi.html" class="segc">WiFi</a>
      <a href="act:openmodal:sig" class="segc">信令</a>
      <a href="act:sigrescan" class="segc">搜网</a>
    </div>
  </div>
</body>
</html>
