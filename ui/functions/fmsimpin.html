<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>飞猫分身切卡</title></head>
<body class="{{THEME}}">
{{STATUSBAR}}

<div class="card">
  <div class="title">当前网络 <span class="r {{FMSTATECLASS}}">{{FMSTATE}}</span></div>
  <table class="kv">
    <tr><td class="kv-l">运营商</td><td class="val">{{FMOPERATOR}}</td></tr>
    <tr><td class="kv-l">网络类型</td><td class="val">{{FMNETTYPE}}</td></tr>
    <tr><td class="kv-l">频段</td><td class="val">{{FMBAND}}</td></tr>
    <tr><td class="kv-l">信号</td><td class="val">{{FMSIGNAL}}</td></tr>
    <tr><td class="kv-l">MCC/MNC</td><td class="val">{{FMMCC}}/{{FMMNC}}</td></tr>
  </table>
</div>

<div class="card">
  <div class="title">一键切卡 <span class="r muted">飞猫分身</span></div>
  <div class="sec" style="color:#ff9999;font-size:.65rem"><i>⚠️ 非飞猫分身卡请勿操作！</i></div>

  <a href="act:fmswitch:0100" class="card lockcard {{FMSLOT0100CLS}}">
    <div class="lc-t">📶 中国移动</div>
    <div class="lc-b">pin=0100 · n41</div>
  </a>

  <a href="act:fmswitch:0200" class="card lockcard {{FMSLOT0200CLS}}">
    <div class="lc-t">📡 中国电信</div>
    <div class="lc-b">pin=0200 · n78</div>
  </a>

  <a href="act:fmswitch:0300" class="card lockcard {{FMSLOT0300CLS}}">
    <div class="lc-t">📲 中国联通</div>
    <div class="lc-b">pin=0300 · n78</div>
  </a>
</div>

{{FMPROGRESS}}

<div class="card">
  <div class="title">操作日志</div>
  {{FMLOG}}
</div>

<div class="pgpad"></div>
{{TOAST}}
</body>
</html></pre>
