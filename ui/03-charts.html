<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body class="{{THEME}}">
  {{STATUSBAR}}

  <div class="card">
    <div class="ctitle">CPU
      <span class="r"><span class="l1d">占用 {{CPUUSAGE}}%</span><span class="l2d">温度 {{CPUTEMP}}°C</span></span>
    </div>
    <div class="chart">{{CHART_CPU}}</div>
  </div>

  <div class="card">
    <div class="ctitle">内存 <span class="r l3d">{{MEM}}%</span></div>
    <div class="chart sm">{{CHART_MEM}}</div>
  </div>

  <div class="card">
    <div class="ctitle">网速 <span class="unit">({{SPUNIT}})</span>
      <span class="r"><span class="l1d">↓ {{RXSPEED}}</span><span class="l2d">↑ {{TXSPEED}}</span></span>
    </div>
    <div class="chart">{{CHART_NET}}</div>
  </div>

  {{DOTS}}
</body>
</html>
