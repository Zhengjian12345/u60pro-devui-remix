<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body class="{{THEME}}">
  {{STATUSBAR}}

  <div class="card">
    <div class="title">系统</div>
    <table>
      <tr><td class="kv-l">CPU 占用</td><td class="val">{{CPUUSAGE}}%</td></tr>
      <tr><td class="kv-l">内存占用</td><td class="val">{{MEM}}%</td></tr>
      <tr><td class="kv-l">CPU 温度</td><td class="val">{{CPUTEMP}}°C</td></tr>
      <tr><td class="kv-l">电池温度</td><td class="val">{{BATTEMP}}°C</td></tr>
      <tr><td class="kv-l">运行时间</td><td class="val">{{UPTIME}}</td></tr>
      <tr><td class="kv-l">版本号</td><td class="val sm">{{SWVER}}</td></tr>
      <tr><td class="kv-l">IMEI <a href="act:revealimei" class="rev">{{IMEIBTN}}</a></td><td class="val sm">{{IMEI}}</td></tr>
    </table>
  </div>

  <div class="card">
    <div class="row">
      <span class="lab">ADB 调试<span class="st">{{ADBSTATE}}</span></span>
      <a href="act:adb" class="sw {{ADBCLASS}}"><span class="kn"></span></a>
    </div>
    <div class="row">
      <span class="lab">速率单位<span class="st">{{SPUNITSTATE}}</span></span>
      <a href="act:spunit" class="sw {{SPUNITCLASS}}"><span class="kn"></span></a>
    </div>
    <div class="row">
      <span class="lab">界面主题<span class="st">{{THEMESTATE}}</span></span>
      <a href="act:theme" class="sw {{THEMECLASS}}"><span class="kn"></span></a>
    </div>
  </div>

  {{DOTS}}
</body>
</html>
